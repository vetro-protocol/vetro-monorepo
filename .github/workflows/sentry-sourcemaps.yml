name: Upload Sentry Source Maps

on:
  push:
    branches:
      - master
    paths:
      - "api/**"
      - "packages/**"
      - "pnpm-lock.yaml"

permissions:
  contents: read

jobs:
  upload-sourcemaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: hemilabs/actions/setup-node-env@8f87619b7f0122c39e14a32514ab3e4e0d4c3966 # v2.3.0
        with:
          package-manager: pnpm
      - run: pnpm exec wrangler deploy --dry-run --outdir=dist
        working-directory: api
      - run: pnpm exec sentry-cli sourcemaps upload --release=${{ github.sha }} ./dist
        working-directory: api
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: hemi-labs
          SENTRY_PROJECT: vetro-api
