type VaultHistory @entity(immutable: false) {
  id: ID!
  shareValue: BigInt!
  stakingVaultAddress: Bytes!
  timestamp: BigInt! # Timestamp fixed to YYYY-MM-DD 00:00:00 UTC
  totalAssets: BigInt! # Total underlying assets held by the vault (ERC4626 totalAssets)
}

type ExitTicket @entity(immutable: false) {
  assets: BigInt!
  cancelTxHash: Bytes
  claimableAt: BigInt!
  claimTxHash: Bytes
  id: ID!
  owner: Bytes!
  receiver: Bytes
  requestId: BigInt!
  requestTxHash: Bytes!
  shares: BigInt!
  stakingVaultAddress: Bytes!
}

type ExitTicketQueueSummary @entity(immutable: false) {
  id: ID!
  openTickets: Int!
  shares: BigInt!
  stakingVaultAddress: Bytes!
}

type UserStakingPosition @entity(immutable: false) {
  id: ID!
  owner: Bytes!
  shares: BigInt!
  stakingVaultAddress: Bytes!
  totalCostBasis: BigInt! # WAD-scaled (36 decimals when asset has 18 decimals)
}

type VaultConfig @entity(immutable: true) {
  id: Bytes! # vault address
  decimals: Int!
}
