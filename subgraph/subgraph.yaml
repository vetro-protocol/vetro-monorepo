specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: StakingVault
    network: mainnet
    source:
      address: "0x4a16B99f23c5511f0A23EF9770Bf4ab28f37D830" # Test contract
      abi: StakingVault
      startBlock: 24420695
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TaskEvent
      abis:
        - name: StakingVault
          file: ./abis/StakingVault.json
      eventHandlers:
        - event: WithdrawCancelled(indexed address,indexed uint256,uint256,uint256)
          handler: handleWithdrawCancelled
        - event: WithdrawClaimed(indexed address,indexed address,indexed uint256,uint256)
          handler: handleWithdrawClaimed
        - event: WithdrawRequested(indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleWithdrawRequested
      blockHandlers:
        - handler: handleBlock
      file: ./src/earn.ts
